map $http_user_agent $is_bot {
    default 0;
    "~*googlebot"           1;
    "~*bingbot"             1;
    "~*yandex"              1;
    "~*baiduspider"         1;
    "~*duckduckbot"         1;
    "~*slurp"               1;
    "~*linkedinbot"         1;
    "~*facebookexternalhit" 1;
    "~*twitterbot"          1;
    "~*slackbot"            1;
    "~*whatsapp"            1;
    "~*telegrambot"         1;
    "~*discordbot"          1;
    "~*applebot"            1;
    "~*redditbot"           1;
    "~*pinterest"           1;
    "~*embedly"             1;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ~* \.(?:js|css|woff2?|ttf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /sitemap.xml {
        add_header Content-Type "application/xml" always;
        try_files $uri =404;
    }

    location = / {
        if ($is_bot) { rewrite ^ /_prerendered/index.html break; }
        try_files $uri /index.html;
    }

    location = /brands {
        if ($is_bot) { rewrite ^ /_prerendered/brands/index.html break; }
        try_files $uri /index.html;
    }

    location ~ ^/brand/([^/]+)/?$ {
        # Capture $1 into a named variable immediately: referencing $is_bot below
        # triggers the map's own regex match against $http_user_agent, which
        # would otherwise clobber the numbered $1 from this location's regex.
        set $brand_id $1;
        if ($is_bot) { rewrite ^ /_prerendered/brand/$brand_id/index.html break; }
        try_files $uri /index.html;
    }

    location = /blogs {
        if ($is_bot) { rewrite ^ /_prerendered/blogs/index.html break; }
        try_files $uri /index.html;
    }

    location ~ ^/blogs/([^/]+)/?$ {
        set $blog_slug $1;
        if ($is_bot) { rewrite ^ /_prerendered/blogs/$blog_slug/index.html break; }
        try_files $uri /index.html;
    }

    location ~ ^/(about|how-it-works|submit-a-brand|contact|privacy|terms)/?$ {
        set $static_page $1;
        if ($is_bot) { rewrite ^ /_prerendered/$static_page/index.html break; }
        try_files $uri /index.html;
    }

    location / {
        try_files $uri /index.html;
    }
}
